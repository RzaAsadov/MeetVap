name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Mobile lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  server:
    name: Server lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://messenger:messenger@127.0.0.1:5432/messenger?schema=public
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run build

  browser:
    name: Build ${{ matrix.application }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - application: Browser messenger
            directory: web
          - application: Public Meet client
            directory: meet
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.directory }}
      - run: npm run build
        working-directory: ${{ matrix.directory }}

  supporting-surfaces:
    name: Admin and PHP syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
        working-directory: admin
      - run: node --check admin/server.js
      - name: Lint tracked PHP files
        shell: bash
        run: |
          mapfile -t files < <(find catalog help -type f -name '*.php' -print)
          for file in "${files[@]}"; do php -l "$file"; done
